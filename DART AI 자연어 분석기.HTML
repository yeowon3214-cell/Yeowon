<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DART AI 자연어 분석기</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  
  <!-- Babel (JSX 컴파일용) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    /* 기본 폰트 설정 및 Tailwind Prose 유사 스타일 (간이 구현) */
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    .prose { max-w: 65ch; color: #374151; }
    .prose h1, .prose h2, .prose h3 { color: #111827; margin-top: 2em; margin-bottom: 1em; line-height: 1.3333333; }
    .prose h1 { font-size: 2.25em; font-weight: 800; }
    .prose h2 { font-size: 1.5em; font-weight: 700; }
    .prose h3 { font-size: 1.25em; font-weight: 600; }
    .prose p { margin-top: 1.25em; margin-bottom: 1.25em; }
    .prose ul { list-style-type: disc; margin-top: 1.25em; margin-bottom: 1.25em; padding-left: 1.625em; }
    .prose li { margin-top: 0.5em; margin-bottom: 0.5em; }
    .prose strong { font-weight: 600; color: #111827; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // 아이콘 컴포넌트 래퍼 (Lucide 브라우저 스크립트 활용)
    const Icon = ({ name, className }) => {
      const iconRef = useRef(null);
      useEffect(() => {
        if (iconRef.current) {
          iconRef.current.innerHTML = '';
          const iconNode = lucide.createIcons({
            icons: { [name]: lucide.icons[name] },
            nameAttr: 'data-lucide',
            attrs: { class: className }
          });
          lucide.createIcons({root: iconRef.current});
        }
      }, [name, className]);
      
      return <span ref={iconRef} data-lucide={name} className={className}></span>;
    };

    // ==========================================
    // Gemini API 설정
    // ==========================================
    const geminiApiKey = ""; // ★ 여기에 API 키를 입력하세요

    // 재시도 로직이 포함된 API 호출 함수
    const fetchWithRetry = async (url, options, maxRetries = 5) => {
      let retries = 0;
      while (retries < maxRetries) {
        try {
          const response = await fetch(url, options);
          if (!response.ok) {
            let errorMessage = 'Unknown error';
            try {
              const errorData = await response.json();
              errorMessage = errorData.error?.message || JSON.stringify(errorData);
            } catch (e) {
              errorMessage = response.statusText || '서버 응답 오류';
            }
            throw new Error(`HTTP error! status: ${response.status}, message: ${errorMessage}`);
          }
          return await response.json();
        } catch (error) {
          retries++;
          if (retries >= maxRetries) throw error;
          const delay = Math.pow(2, retries - 1) * 1000;
          await new Promise(resolve => setTimeout(resolve, delay));
        }
      }
    };

    // ==========================================
    // 마크다운 렌더러
    // ==========================================
    const MarkdownRenderer = ({ content }) => {
      const createMarkup = (text) => {
        if (!text) return { __html: '' };
        
        let html = text;

        html = html.replace(/(?:^\|.*?\|[ \t]*\r?\n)+/gm, (match) => {
          const rows = match.trim().split(/\r?\n/);
          if (rows.length < 3) return match;
          
          const tableRows = rows.map(row => 
            row.split('|').map(cell => cell.trim()).filter((_, i, arr) => i > 0 && i < arr.length - 1)
          );
          
          if (!tableRows[1] || !tableRows[1].every(cell => /^[-: ]+$/.test(cell))) return match;

          const headers = tableRows[0];
          const bodyRows = tableRows.slice(2);

          let tableHtml = '<div class="overflow-x-auto my-8 bg-white rounded-xl shadow-sm border border-slate-200"><table class="min-w-full divide-y divide-slate-200 text-sm">';
          
          tableHtml += '<thead class="bg-slate-100"><tr>';
          headers.forEach(h => { tableHtml += `<th class="px-5 py-4 font-bold text-slate-800 text-center whitespace-nowrap border-b border-slate-200">${h}</th>`; });
          tableHtml += '</tr></thead>';
          
          tableHtml += '<tbody class="divide-y divide-slate-100">';
          bodyRows.forEach((row, rowIdx) => {
            tableHtml += `<tr class="hover:bg-blue-50 transition-colors ${rowIdx % 2 === 0 ? 'bg-white' : 'bg-slate-50/30'}">`;
            row.forEach((cell, idx) => {
              const align = idx === 0 ? 'text-left font-bold text-slate-700' : 'text-center text-slate-600';
              tableHtml += `<td class="px-5 py-3.5 ${align}">${cell}</td>`;
            });
            tableHtml += '</tr>';
          });
          tableHtml += '</tbody></table></div>';
          
          return tableHtml;
        });

        html = html
          .replace(/^## (💡\s*사용자 질문 핵심 답변.*$)/gim, '<div class="mt-4 mb-8"><h2 class="text-2xl font-bold text-slate-900 inline-block border-b-4 border-blue-500 pb-2">$1</h2></div>')
          .replace(/^## (1\.\s*기업 및 공시 요약.*$)/gim, '<div class="mt-12 mb-6 bg-emerald-50 border-l-4 border-emerald-500 p-4 rounded-r-xl shadow-sm"><h2 class="text-xl font-bold text-emerald-900 m-0">$1</h2></div>')
          .replace(/^## (2\.\s*주요 실적 및 재무 하이라이트.*$)/gim, '<div class="mt-12 mb-6 flex items-center gap-3"><div class="h-9 w-9 rounded-full bg-gradient-to-tr from-purple-600 to-blue-500 flex items-center justify-center text-white font-bold shadow-md">2</div><h2 class="text-xl font-extrabold text-slate-900 m-0">$1</h2><div class="flex-1 h-px bg-gradient-to-r from-slate-300 to-transparent"></div></div>')
          .replace(/^## (3\.\s*핵심 경영 사항.*$)/gim, '<div class="mt-12 mb-6 border-2 border-dashed border-amber-400 p-3 text-center rounded-xl bg-amber-50/50"><h2 class="text-xl font-bold text-amber-900 m-0">$1</h2></div>')
          .replace(/^## (4\.\s*📊?\s*산업 동향 및 경쟁사.*$)/gim, '<div class="mt-14 mb-8 relative"><div class="absolute inset-0 flex items-center"><div class="w-full border-t-2 border-slate-200"></div></div><div class="relative flex justify-center"><span class="bg-slate-800 text-white text-lg font-bold px-6 py-2.5 rounded-full shadow-lg ring-4 ring-white">$1</span></div></div>')
          .replace(/^## (5\.\s*종합 분석 및 향후 전망.*$)/gim, '<div class="mt-14 mb-6"><h2 class="text-2xl font-black text-slate-900 tracking-tight pb-3 border-b-2 border-slate-900 inline-block">$1</h2><div class="h-1 w-full bg-slate-100 mt-1 rounded-full"></div></div>');

        html = html
          .replace(/^### (.*$)/gim, '<h3 class="text-lg font-bold mt-8 mb-3 text-slate-800 flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-blue-500 shadow-sm"></span>$1</h3>')
          .replace(/^## ((?!<div).*$)/gim, '<h2 class="text-xl font-bold mt-10 mb-4 text-slate-900 border-b border-slate-200 pb-2">$1</h2>')
          .replace(/^# (.*$)/gim, '<h1 class="text-3xl font-extrabold mt-8 mb-6 text-slate-900">$1</h1>')
          .replace(/\*\*(.*?)\*\*/gim, '<strong class="text-slate-900 font-extrabold bg-blue-50/50 px-1 rounded">$1</strong>')
          .replace(/^\* (.*$)/gim, '<li class="ml-6 list-disc mb-1.5 pl-1">$1</li>')
          .replace(/^- (.*$)/gim, '<li class="ml-6 list-disc mb-1.5 pl-1">$1</li>')
          .replace(/\n/gim, '<br />');

        html = html.replace(/(<li.*<\/li>)/gim, '<ul class="mb-5 space-y-1 text-slate-700">$1</ul>');
        html = html.replace(/<\/ul><br \/><ul>/gim, ''); 
        html = html.replace(/(<br \/>){3,}/gim, '<br /><br />');

        return { __html: html };
      };

      return (
        <div 
          className="prose max-w-none leading-relaxed text-slate-700 text-[16px]"
          dangerouslySetInnerHTML={createMarkup(content)}
        />
      );
    };

    // ==========================================
    // 메인 앱 컴포넌트
    // ==========================================
    function App() {
      const [query, setQuery] = useState('');
      const [dartApiKey, setDartApiKey] = useState('');
      const [showSettings, setShowSettings] = useState(false);
      const [searchPeriod, setSearchPeriod] = useState('12');
      
      const [status, setStatus] = useState('idle'); 
      const [errorMsg, setErrorMsg] = useState('');
      const [result, setResult] = useState(null);
      
      const messagesEndRef = useRef(null);

      const corpCodeMap = {
        '삼성전자': '00126380',
        'SK하이닉스': '00164779',
        '현대자동차': '00164742',
        'LG에너지솔루션': '01515354',
        '카카오': '00258801',
        '네이버': '00266961',
        'NAVER': '00266961'
      };

      const periodTextMap = {
        '1': '최근 1개월',
        '3': '최근 3개월',
        '6': '최근 6개월',
        '12': '최근 1년',
        '36': '최근 3년'
      };

      // HTML 다운로드 핸들러
      const handleDownloadHTML = () => {
        const reportElement = document.getElementById('report-export-area');
        if (!reportElement || !result) return;

        const htmlContent = `
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>${result.companyName} 분석 리포트 - DART AI</title>
  <script src="https://cdn.tailwindcss.com"><\/script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: #f8fafc; padding: 40px 20px; }
    .export-container { max-w: 1000px; margin: 0 auto; }
    /* 출력용 설정 */
    @media print {
      body { background-color: white; padding: 0; }
      .export-container { max-w: 100%; box-shadow: none; }
    }
  </style>
</head>
<body>
  <div class="export-container">
    <div style="text-align: right; margin-bottom: 20px;">
      <span style="color: #64748b; font-size: 0.875rem;">생성일시: ${new Date().toLocaleString()}</span>
    </div>
    ${reportElement.innerHTML}
  </div>
</body>
</html>`;

        const blob = new Blob([htmlContent], { type: 'text/html;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `${result.companyName}_DART분석리포트.html`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
      };

      const extractCompanyFromQuery = async (userQuery) => {
        setStatus('extracting');
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${geminiApiKey}`;
        
        const payload = {
          contents: [{ parts: [{ text: userQuery }] }],
          systemInstruction: { 
            parts: [{ text: "사용자의 질문에서 대상 '기업명'을 추출해. 만약 기업명이 없다면 빈 문자열을 반환해." }] 
          },
          generationConfig: {
            responseMimeType: "application/json",
            responseSchema: {
              type: "OBJECT",
              properties: { companyName: { type: "STRING" } }
            }
          }
        };

        const data = await fetchWithRetry(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        let parsedText = data.candidates?.[0]?.content?.parts?.[0]?.text;
        if (parsedText) {
          try {
            const cleanText = parsedText.replace(/```json/gi, '').replace(/```/g, '').trim();
            const result = JSON.parse(cleanText);
            return result.companyName || "";
          } catch (e) {
            console.error("JSON 파싱 에러:", e, parsedText);
            throw new Error("AI 응답을 분석하는 중 오류가 발생했습니다.");
          }
        }
        throw new Error("기업명을 추출할 수 없습니다.");
      };

      const fetchDartDisclosures = async (corpCode) => {
        if (!dartApiKey) return null;
        setStatus('searching');
        
        try {
          const today = new Date();
          let bgnDate = new Date(today);
          bgnDate.setMonth(today.getMonth() - parseInt(searchPeriod));
          
          const formatDate = (date) => {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}${m}${d}`;
          };

          const bgnDe = formatDate(bgnDate);
          const endDe = formatDate(today);
          
          const dartUrl = `https://opendart.fss.or.kr/api/list.json?crtfc_key=${dartApiKey}&corp_code=${corpCode}&bgn_de=${bgnDe}&end_de=${endDe}&pblntf_ty=A&pblntf_ty=B`;
          
          const response = await fetch(dartUrl);
          if (!response.ok) throw new Error("DART API 호출 실패");
          
          const data = await response.json();
          if (data.status !== "000") {
            console.warn("DART API 에러 응답:", data.message);
            return null; 
          }
          return data.list.slice(0, 15); 
        } catch (err) {
          console.warn("DART API 직접 호출 실패", err);
          return null;
        }
      };

      const analyzeDisclosures = async (companyName, dartData, originalQuery) => {
        setStatus('analyzing');
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${geminiApiKey}`;
        
        const targetPeriodText = periodTextMap[searchPeriod];

        let promptText = `
          사용자의 질문/명령: "${originalQuery}"
          대상 기업: "${companyName}"
          검색 및 분석 대상 기간: "${targetPeriodText}"
          
          당신은 최고 수준의 기업 공시, 재무, 그리고 산업 분석가입니다. 
          다음 지시사항에 따라 구글 검색(Grounding)을 최대한 활용하여 매우 깊이 있고 상세한 심층 분석 리포트를 작성해주세요.
          
          [지시사항]
          1. 사용자 질문의 의도를 파악하고 최우선으로 답변하세요.
          2. 대상 기업("${companyName}")의 ${targetPeriodText} 내의 주요 전자공시(DART) 자료, 실적발표 등을 바탕으로 아주 구체적으로 서술하세요.
          3. 4번 항목(산업 동향 및 경쟁사 비교)은 반드시 한눈에 파악할 수 있도록 각 줄이 파이프(|)로 시작하고 끝나는 완벽한 마크다운 표(Table) 형식으로만 작성하세요.
          
          다음 구조를 엄격히 준수하세요:
          
          ## 💡 사용자 질문 핵심 답변
          (질문에 대한 직접적이고 구체적인 요약 답변)
          
          ## 1. 기업 및 공시 요약 (${targetPeriodText} 기준)
          (${targetPeriodText} 간의 주요 공시 내역과 핵심 이슈 상세 요약)
          
          ## 2. 주요 실적 및 재무 하이라이트
          (서술형(개요식)으로 작성. 단순 수치 나열이나 글머리기호 금지. 매출, 이익 변화와 그 원인을 부드럽고 상세히 풀어서 설명)
          
          ## 3. 핵심 경영 사항
          (투자, 배당, 지분변동 등 경영 판단 상세 분석)
          
          ## 4. 📊 산업 동향 및 경쟁사(Peer) 비교
          (해당 기업이 속한 산업의 평균 지표와 주요 경쟁사 비교. **반드시 마크다운 표로 작성**)
          
          ## 5. 종합 분석 및 향후 전망
          (위 내용을 종합한 근거 있는 향후 전망)
        `;

        if (dartData && dartData.length > 0) {
          promptText += `\n\n[참고 데이터]\n${JSON.stringify(dartData, null, 2)}`;
        } else {
          promptText += `\n\n[지시사항: DART API 직접 호출 대신 Google Search를 활용하여 검색할 것.]`;
        }

        const payload = {
          contents: [{ parts: [{ text: promptText }] }],
          tools: [{ google_search: {} }] 
        };

        const data = await fetchWithRetry(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const analysisText = data.candidates?.[0]?.content?.parts?.[0]?.text;
        const sources = data.candidates?.[0]?.groundingMetadata?.groundingAttributions?.map(a => ({
          uri: a.web?.uri,
          title: a.web?.title
        })) || [];

        return { analysis: analysisText, sources: sources, usedDartApi: !!dartData, periodText: targetPeriodText };
      };

      const handleSearch = async (e) => {
        e.preventDefault();
        if (!query.trim()) return;

        setResult(null);
        setErrorMsg('');
        
        try {
          const companyName = await extractCompanyFromQuery(query);
          if (!companyName) {
            throw new Error("질문에서 분석할 기업명을 찾을 수 없습니다.");
          }

          let dartData = null;
          if (dartApiKey) {
            const corpCode = corpCodeMap[companyName] || corpCodeMap[companyName.toUpperCase()];
            if (corpCode) {
              dartData = await fetchDartDisclosures(corpCode);
            }
          }

          const finalAnalysis = await analyzeDisclosures(companyName, dartData, query);
          
          setResult({ companyName, ...finalAnalysis });
          setStatus('complete');

        } catch (err) {
          console.error(err);
          setErrorMsg(err.message || "분석 중 오류가 발생했습니다.");
          setStatus('error');
        }
      };

      const getStatusText = () => {
        switch (status) {
          case 'extracting': return '질문 분석 및 대상 기업 식별 중...';
          case 'searching': return `DART 시스템에서 ${periodTextMap[searchPeriod]} 공시 수집 중...`;
          case 'analyzing': return 'AI 심층 분석 리포트 작성 중...';
          default: return '';
        }
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans text-slate-800">
          <header className="bg-white border-b border-slate-200 sticky top-0 z-20 shadow-sm">
            <div className="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="flex justify-between items-center h-16">
                <div className="flex items-center gap-2">
                  <div className="bg-gradient-to-r from-blue-600 to-indigo-600 p-2 rounded-lg shadow-sm">
                    <Icon name="file-text" className="h-5 w-5 text-white" />
                  </div>
                  <h1 className="text-xl font-black tracking-tight text-slate-900">DART AI Insight</h1>
                </div>
                <button 
                  onClick={() => setShowSettings(!showSettings)}
                  className="p-2 text-slate-400 hover:text-slate-600 hover:bg-slate-100 rounded-full transition-colors"
                >
                  <Icon name="settings" className="h-5 w-5" />
                </button>
              </div>
            </div>
          </header>

          {showSettings && (
            <div className="bg-white border-b border-slate-200 p-4 shadow-inner">
              <div className="max-w-5xl mx-auto flex flex-col gap-3">
                <label className="text-sm font-semibold text-slate-700 flex items-center gap-2">
                  Open DART API Key (선택사항)
                  <span className="text-xs font-normal text-slate-500">비워두시면 AI 웹 검색으로 동작합니다.</span>
                </label>
                <input 
                  type="password"
                  value={dartApiKey}
                  onChange={(e) => setDartApiKey(e.target.value)}
                  placeholder="API Key 입력"
                  className="w-full max-w-lg px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                />
              </div>
            </div>
          )}

          <main className="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8 sm:py-12">
            <div className={`transition-all duration-700 ease-in-out ${status === 'idle' ? 'mt-16 sm:mt-24' : 'mt-0'}`}>
              <div className="text-center mb-10">
                <h2 className="text-3xl sm:text-4xl lg:text-5xl font-extrabold text-slate-900 mb-5 tracking-tight leading-tight">
                  기업 공시자료를 <br className="sm:hidden" /><span className="text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-indigo-600">자연어</span>로 탐색하세요
                </h2>
                <div className="text-slate-500 text-base sm:text-lg space-y-2 mt-4 max-w-2xl mx-auto">
                  <ul className="inline-block text-left text-sm sm:text-base bg-white border border-slate-200 rounded-2xl p-5 shadow-sm mt-2">
                    <li className="flex items-start gap-2 mb-2"><span className="text-blue-500 font-bold">✓</span> "삼성전자 배당 공시 찾아보고, TSMC랑 영업이익률 비교해줘"</li>
                    <li className="flex items-start gap-2 mb-2"><span className="text-indigo-500 font-bold">✓</span> "현대자동차 주요 경영진 지분 변동사항 알려줘"</li>
                  </ul>
                </div>
              </div>

              <form onSubmit={handleSearch} className="max-w-3xl mx-auto">
                <div className="flex flex-col sm:flex-row gap-3 bg-white p-2 rounded-2xl sm:rounded-full shadow-lg shadow-blue-900/5 border border-slate-200 transition-all focus-within:ring-2 focus-within:ring-blue-500 focus-within:border-blue-500">
                  <div className="flex items-center pl-4 pr-2 sm:border-r border-slate-200 py-2 sm:py-0">
                    <Icon name="filter" className="h-5 w-5 text-slate-400 mr-2 shrink-0" />
                    <select 
                      value={searchPeriod}
                      onChange={(e) => setSearchPeriod(e.target.value)}
                      disabled={['extracting', 'searching', 'analyzing'].includes(status)}
                      className="bg-transparent text-slate-700 font-medium focus:outline-none cursor-pointer disabled:text-slate-400"
                    >
                      <option value="1">최근 1개월</option>
                      <option value="3">최근 3개월</option>
                      <option value="6">최근 6개월</option>
                      <option value="12">최근 1년</option>
                      <option value="36">최근 3년</option>
                    </select>
                  </div>

                  <div className="flex-1 flex items-center relative py-1 sm:py-0">
                    <Icon name="search" className="absolute left-3 h-5 w-5 text-slate-400 hidden sm:block" />
                    <input
                      type="text"
                      value={query}
                      onChange={(e) => setQuery(e.target.value)}
                      disabled={['extracting', 'searching', 'analyzing'].includes(status)}
                      className="w-full sm:pl-10 pr-4 py-3 bg-transparent placeholder-slate-400 focus:outline-none text-base sm:text-lg transition-all disabled:text-slate-500 px-4 sm:px-0"
                      placeholder="분석을 요청해 보세요 (예: 작년 실적 요약해줘)"
                    />
                  </div>

                  <button
                    type="submit"
                    disabled={!query.trim() || ['extracting', 'searching', 'analyzing'].includes(status)}
                    className="bg-slate-900 hover:bg-blue-600 disabled:bg-slate-300 text-white font-bold py-3 px-8 rounded-xl sm:rounded-full transition-colors flex items-center justify-center gap-2 shrink-0 w-full sm:w-auto"
                  >
                    분석 시작
                    <Icon name="arrow-right" className="h-4 w-4" />
                  </button>
                </div>
              </form>
            </div>

            {['extracting', 'searching', 'analyzing'].includes(status) && (
              <div className="mt-20 flex flex-col items-center justify-center space-y-6">
                <div className="relative">
                  <div className="absolute inset-0 bg-blue-200 rounded-full blur-2xl opacity-60 animate-pulse"></div>
                  <div className="bg-white p-4 rounded-full shadow-lg relative z-10 border border-slate-100">
                    <Icon name="loader-2" className="h-10 w-10 text-blue-600 animate-spin" />
                  </div>
                </div>
                <p className="text-lg font-bold text-slate-700 bg-white px-6 py-2 rounded-full shadow-sm border border-slate-200">
                  {getStatusText()}
                </p>
              </div>
            )}

            {status === 'error' && (
              <div className="mt-12 max-w-3xl mx-auto bg-red-50 border border-red-200 rounded-2xl p-6 flex items-start gap-4 shadow-sm">
                <Icon name="alert-circle" className="h-6 w-6 text-red-600 shrink-0 mt-0.5" />
                <div>
                  <h3 className="text-sm font-bold text-red-800 uppercase tracking-wide">Error Occurred</h3>
                  <p className="mt-1 text-red-700 leading-relaxed">{errorMsg}</p>
                </div>
              </div>
            )}

            {status === 'complete' && result && (
              <div className="mt-16" id="report-export-area">
                <div className="grid grid-cols-1 sm:grid-cols-3 gap-5 mb-10">
                  <div className="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm flex items-center gap-5">
                    <div className="bg-blue-50 p-4 rounded-2xl"><Icon name="building" className="h-7 w-7 text-blue-600" /></div>
                    <div>
                      <p className="text-xs text-slate-500 font-bold uppercase tracking-wider mb-1">분석 대상 기업</p>
                      <p className="text-xl font-black text-slate-900">{result.companyName}</p>
                    </div>
                  </div>
                  <div className="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm flex items-center gap-5">
                    <div className="bg-emerald-50 p-4 rounded-2xl"><Icon name="calendar" className="h-7 w-7 text-emerald-600" /></div>
                    <div>
                      <p className="text-xs text-slate-500 font-bold uppercase tracking-wider mb-1">설정된 분석 기간</p>
                      <p className="text-xl font-black text-slate-900">{result.periodText}</p>
                    </div>
                  </div>
                  <div className="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm flex items-center gap-5">
                    <div className="bg-purple-50 p-4 rounded-2xl"><Icon name="trending-up" className="h-7 w-7 text-purple-600" /></div>
                    <div>
                      <p className="text-xs text-slate-500 font-bold uppercase tracking-wider mb-1">데이터 분석 방식</p>
                      <p className="text-lg font-black text-slate-900">
                        {result.usedDartApi ? 'Open DART 연동' : 'AI Grounding 탐색'}
                      </p>
                    </div>
                  </div>
                </div>

                <div className="bg-white rounded-3xl p-6 sm:p-12 shadow-md border border-slate-200 mb-10 relative">
                  {/* 다운로드 버튼 추가 */}
                  <div className="absolute top-6 right-6 sm:top-10 sm:right-10">
                    <button 
                      onClick={handleDownloadHTML}
                      className="flex items-center gap-2 bg-blue-50 text-blue-700 hover:bg-blue-100 px-4 py-2 rounded-full text-sm font-bold transition-colors border border-blue-200"
                    >
                      <Icon name="download" className="h-4 w-4" />
                      <span className="hidden sm:inline">HTML로 저장</span>
                    </button>
                  </div>

                  <div className="flex items-center gap-4 mb-8 pb-8 border-b border-slate-100">
                    <div className="h-10 w-3 bg-gradient-to-b from-blue-500 to-indigo-600 rounded-full"></div>
                    <div>
                      <h2 className="text-3xl font-black text-slate-900 tracking-tight pr-24">AI 심층 분석 리포트</h2>
                      <p className="text-sm text-slate-500 mt-1">{result.companyName}에 대한 {result.periodText} 간의 데이터 분석 결과입니다.</p>
                    </div>
                  </div>
                  
                  <MarkdownRenderer content={result.analysis} />
                </div>

                {result.sources && result.sources.length > 0 && (
                  <div className="bg-slate-100 rounded-3xl p-6 sm:p-8 border border-slate-200 mb-20">
                    <h3 className="text-sm font-bold text-slate-500 uppercase tracking-widest mb-6 flex items-center gap-2">
                      <Icon name="search" className="h-5 w-5 text-slate-400" />
                      AI가 참고한 정보 출처
                    </h3>
                    <div className="overflow-x-auto bg-white rounded-2xl border border-slate-200 shadow-sm">
                      <table className="min-w-full divide-y divide-slate-200 text-sm text-left">
                        <thead className="bg-slate-50">
                          <tr>
                            <th scope="col" className="px-5 py-4 font-bold text-slate-700 whitespace-nowrap w-12 text-center">No.</th>
                            <th scope="col" className="px-5 py-4 font-bold text-slate-700 min-w-[200px]">출처 기사 제목</th>
                            <th scope="col" className="px-5 py-4 font-bold text-slate-700 min-w-[250px]">원본 링크</th>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-slate-100">
                          {result.sources.map((source, idx) => (
                            source.uri && source.title && (
                              <tr key={idx} className="hover:bg-slate-50">
                                <td className="px-5 py-4 text-slate-500 whitespace-nowrap text-center font-medium">{idx + 1}</td>
                                <td className="px-5 py-4 font-bold text-slate-800">
                                  <span className="line-clamp-2">{source.title}</span>
                                </td>
                                <td className="px-5 py-4">
                                  <a href={source.uri} target="_blank" rel="noopener noreferrer" className="text-blue-600 hover:underline break-all">
                                    {source.uri}
                                  </a>
                                </td>
                              </tr>
                            )
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>
                )}
              </div>
            )}
            <div ref={messagesEndRef} />
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
