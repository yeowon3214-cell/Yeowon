<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 통합 기업 분석 플랫폼</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- html2pdf.js (PDF 변환 라이브러리) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel (JSX 컴파일러) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in-up { animation: fadeInUp 0.5s ease-out forwards; }
        @keyframes bounceSlight { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
        .animate-bounce-slight { animation: bounceSlight 2s ease-in-out infinite; }
        @supports (padding-bottom: env(safe-area-inset-bottom)) { .pb-safe { padding-bottom: calc(env(safe-area-inset-bottom) + 0.5rem); } }
        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans selection:bg-indigo-100 antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- [Dynamic Data & Statistical Generator] ---
        const getRandomInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
        const getRandomFloat = (min, max) => (Math.random() * (max - min) + min).toFixed(1);

        const generateMockResult = (companyName, industry, uploadedFile) => {
            const displayCompany = companyName?.trim() ? companyName : (uploadedFile ? `[분석 파일] ${uploadedFile}` : "분석 대상 기업");
            
            // 1. ESG 개별 점수 및 통합 점수
            const eScore = getRandomInt(60, 95);
            const sScore = getRandomInt(65, 95);
            const gScore = getRandomInt(60, 95);
            const esgScore = Math.round((eScore + sScore + gScore) / 3);
            
            // 2. 통계적으로 연동된 회귀모형 생성
            const intercept = parseFloat(getRandomFloat(-15, -8));
            const coefEsg = parseFloat(getRandomFloat(0.15, 0.35));
            const coefRnd = parseFloat(getRandomFloat(0.08, 0.18));
            const rndInv = getRandomInt(4, 12);
            const errorTerm = parseFloat(getRandomFloat(-1.5, 1.5));
            
            let targetMargin = parseFloat((intercept + (coefEsg * esgScore) + (coefRnd * rndInv) + errorTerm).toFixed(1));
            targetMargin = Math.max(2.0, Math.min(targetMargin, 28.0));
            
            const targetOCFMargin = parseFloat((targetMargin + parseFloat(getRandomFloat(-1.5, 3.5))).toFixed(1)); 

            // 3. 재무 점수 산출
            let finScore = Math.round(60 + ((targetMargin - 5) / 20) * 35);
            finScore = Math.max(65, Math.min(99, finScore));
            const overall = Math.round((finScore * 0.6) + (esgScore * 0.4)); 
            
            const rSquaredVal = `0.${getRandomInt(78, 92)}`;
            const confidenceLevel = getRandomInt(88, 99); 
            
            const pValEsg = (Math.random() * 0.009).toFixed(3);
            const pValRnd = (Math.random() * 0.04 + 0.001).toFixed(3);

            const generatePeer = (name, baseEsg) => {
                let peerMargin = (intercept + (coefEsg * baseEsg) + (coefRnd * getRandomInt(4, 12)) + parseFloat(getRandomFloat(-2.5, 2.5))).toFixed(1);
                peerMargin = Math.max(1.0, Math.min(parseFloat(peerMargin), 29.0));
                return { name, esgTotal: baseEsg, opMargin: peerMargin, isTarget: false };
            };

            const peers = [
                generatePeer("경쟁사 A", getRandomInt(88, 95)),
                generatePeer("경쟁사 B", getRandomInt(80, 87)),
                { name: "분석 대상기업", esgTotal: esgScore, opMargin: targetMargin, isTarget: true },
                generatePeer("경쟁사 C", getRandomInt(65, 75)),
                generatePeer("경쟁사 D", getRandomInt(55, 64))
            ].sort((a, b) => b.esgTotal - a.esgTotal);

            return {
                companyName: displayCompany,
                overallScore: overall,
                confidenceLevel: confidenceLevel,
                summary: `입력된 자료와 공시 데이터를 교차 분석한 결과, 재무 건전성은 ${finScore >= 85 ? '우수' : '양호'}하며, ESG 경영 측면에서는 ${esgScore >= 80 ? '모범적인 궤도에 올랐습니다.' : '일부 영역의 리스크 관리가 추가로 요구됩니다.'} 특히 도출된 회귀모형에 따르면 ESG 지표 개선이 영업이익률(${targetMargin}%) 상승에 유의미한 통계적 기여를 하고 있습니다.`,
                financials: {
                    score: finScore,
                    status: finScore >= 90 ? "최우수" : finScore >= 80 ? "우수" : "보통",
                    percentile: finScore >= 90 ? "상위 5%" : finScore >= 80 ? "상위 15%" : "상위 30%",
                    details: [
                        { label: "영업이익률", value: `${targetMargin}%`, trend: targetMargin > 12 ? "up" : "down" },
                        { label: "영업현금흐름(OCF)", value: `${targetOCFMargin}%`, trend: targetOCFMargin >= targetMargin ? "up" : "down" },
                        { label: "부채비율", value: `${getRandomFloat(50, 120)}%`, trend: "down" }
                    ],
                    dartInsight: "DART 사업보고서: 전년 대비 매출액 다수 증가, 주요 원인은 해외 수출 다변화 및 원가 절감 성공."
                },
                esg: {
                    score: esgScore,
                    status: esgScore >= 80 ? "우수" : esgScore >= 70 ? "보통" : "주의",
                    details: [
                        { label: "환경(E)", score: eScore, note: "탄소 배출량 집중 관리 필요" },
                        { label: "사회(S)", score: sScore, note: "직원 복지 및 지역사회 공헌 우수" },
                        { label: "지배구조(G)", score: gScore, note: "이사회 다양성 평가 반영" }
                    ],
                    dartInsight: "DART 2023 지속가능경영보고서: 친환경 R&D 비중을 전체의 5%로 확대한다는 경영진의 선언 확인."
                },
                solutions: [
                    {
                        title: "환경(E) 부문 리스크 헷지 전략",
                        description: "탄소 배출권 구매 대비 자체 저감 설비 투자의 장기적 재무 이익률(ROI)이 높을 것으로 예상됩니다. DART 공시된 경쟁사의 투자 사례를 벤치마킹하여 '녹색채권' 발행을 검토하세요.",
                        type: "warning"
                    },
                    {
                        title: "재무적 안정성을 활용한 M&A 검토",
                        description: "현재의 낮은 부채비율과 풍부한 현금흐름을 바탕으로, 부족한 ESG 지표를 단기간에 끌어올릴 수 있는 기후테크 스타트업 인수합병(M&A)을 추천합니다.",
                        type: "success"
                    },
                    {
                        title: "지배구조(G) 공시 강화",
                        description: "외국인 투자자 비중 확대를 위해 이사회 내 사외이사 독립성 및 여성 이사 비율에 대한 구체적인 로드맵을 차기 분기보고서에 명확히 기재할 것을 권장합니다.",
                        type: "info"
                    }
                ],
                esgBreakdown: {
                    E: {
                        title: "환경 (Environment)",
                        score: eScore,
                        theme: { border: "border-emerald-200", bg: "bg-emerald-50/50", text: "text-emerald-700", badgeBg: "bg-emerald-100", badgeText: "text-emerald-800" },
                        checks: [
                            { label: "온실가스 및 에너지 관리", status: eScore > 75 ? "good" : "warning", desc: "동종 업계 대비 탄소 배출량 증감 추세 점검 완료" },
                            { label: "친환경 기술 투자", status: "good", desc: "신규 R&D 투자액의 일부를 친환경 설비에 배정" },
                            { label: "환경경영시스템", status: "normal", desc: "표준 환경경영(ISO 14001) 인증 유지 및 갱신 확인" }
                        ]
                    },
                    S: {
                        title: "사회 (Social)",
                        score: sScore,
                        theme: { border: "border-blue-200", bg: "bg-blue-50/50", text: "text-blue-700", badgeBg: "bg-blue-100", badgeText: "text-blue-800" },
                        checks: [
                            { label: "산업안전보건", status: sScore > 80 ? "good" : "warning", desc: "최근 사업장 내 중대재해 발생 건수 모니터링" },
                            { label: "다양성 및 포용성", status: "normal", desc: "여성 임원 비율 점검 (업계 평균 대비 평가)" },
                            { label: "공급망 상생 관리", status: "good", desc: "협력사 상생 펀드 조성 및 지속가능성 평가 도입" }
                        ]
                    },
                    G: {
                        title: "지배구조 (Governance)",
                        score: gScore,
                        theme: { border: "border-indigo-200", bg: "bg-indigo-50/50", text: "text-indigo-700", badgeBg: "bg-indigo-100", badgeText: "text-indigo-800" },
                        checks: [
                            { label: "이사회 독립성", status: gScore > 75 ? "good" : "warning", desc: "사외이사 비율 과반수 및 의장 분리 점검" },
                            { label: "주주권 보호", status: "good", desc: "전자투표제 도입 및 배당성향 3년 연속 상향 기조" },
                            { label: "윤리경영 및 공시", status: "normal", desc: "컴플라이언스 프로그램 운영 및 세부 위반 통제" }
                        ]
                    }
                },
                peerSampling: {
                    industry: industry,
                    sampleSize: getRandomInt(40, 80),
                    peers: peers
                },
                regression: {
                    formula: `예상 영업이익률(Y) = ${intercept} + ${coefEsg}(ESG스코어) + ${coefRnd}(R&D투자비율) + ε`,
                    rSquared: rSquaredVal,
                    insight: `선택된 ${industry} 업종 기업들의 데이터를 추출해 다중 회귀 분석을 수행한 결과, ESG 스코어 상승이 영업이익률 증가에 기여하는 통계적 유의성이 확인되었습니다. (결정계수 R²=${rSquaredVal})`,
                    variables: [
                        { name: "상수항 (Intercept)", coef: intercept, p: "0.012", sig: "**" },
                        { name: "ESG 통합 스코어", coef: coefEsg, p: pValEsg, sig: "***" },
                        { name: "R&D 투자 비율", coef: coefRnd, p: pValRnd, sig: pValRnd < 0.01 ? "***" : "**" },
                        { name: "부채 비율", coef: "-0.015", p: "0.241", sig: "ns" }
                    ]
                }
            };
        };

        function App() {
            const [activeTab, setActiveTab] = useState('analyze'); 
            const [companyName, setCompanyName] = useState('');
            const [industry, setIndustry] = useState('IT/소프트웨어');
            const [inputData, setInputData] = useState('');
            const [dartQuery, setDartQuery] = useState('');
            const [uploadedFile, setUploadedFile] = useState(null);
            
            const [analysisState, setAnalysisState] = useState('idle'); 
            const [loadingStep, setLoadingStep] = useState(0);
            const [result, setResult] = useState(null);

            const loadingSteps = [
                "입력된 기업 내부 자료 파싱 중...",
                "DART 전자공시시스템 자연어 검색 (키워드 매칭)...",
                "DART 사업보고서 및 재무제표 AI 분석 중...",
                "ESG 지표 및 재무 데이터 크로스체크 연산...",
                "데이터 기반 다중 회귀모형(Regression Model) 학습 및 도출...",
                "종합 인사이트 및 맞춤형 솔루션 도출 중..."
            ];

            useEffect(() => {
                let interval;
                if (analysisState === 'analyzing') {
                    interval = setInterval(() => {
                        setLoadingStep((prev) => {
                            if (prev >= loadingSteps.length - 1) {
                                clearInterval(interval);
                                setTimeout(() => {
                                    setAnalysisState('complete');
                                    setResult(generateMockResult(companyName, industry, uploadedFile));
                                }, 1000);
                                return prev;
                            }
                            return prev + 1;
                        });
                    }, 1200); 
                }
                return () => clearInterval(interval);
            }, [analysisState, companyName, industry, uploadedFile, loadingSteps.length]);

            const handleAnalyze = () => {
                if (!companyName.trim() && !uploadedFile) {
                    alert("기업명을 입력하거나 분석할 데이터 파일을 업로드해주세요.");
                    return;
                }
                setAnalysisState('analyzing');
                setLoadingStep(0);
                setResult(null);
            };

            const resetAnalysis = () => {
                setAnalysisState('idle');
                setCompanyName('');
                setInputData('');
                setDartQuery('');
                setUploadedFile(null);
                setResult(null);
                setLoadingStep(0);
            };

            const handleDownloadReport = () => {
                if (!result) return;
                
                // PDF로 변환할 컨테이너 요소를 가져옵니다.
                const element = document.getElementById('report-container');
                
                // PDF 변환 옵션 설정 (해상도 및 여백 조절)
                const opt = {
                    margin:       [5, 5, 5, 5],
                    filename:     `${result.companyName}_통합분석리포트.pdf`,
                    image:        { type: 'jpeg', quality: 0.98 },
                    html2canvas:  { scale: 2, useCORS: true },
                    jsPDF:        { unit: 'mm', format: 'a3', orientation: 'portrait' }
                };

                // html2pdf 라이브러리를 사용하여 시각적 PDF 다운로드 실행
                html2pdf().set(opt).from(element).save();
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    setUploadedFile(file.name);
                }
            };

            const handleDragOver = (e) => { e.preventDefault(); };
            const handleDrop = (e) => {
                e.preventDefault();
                const file = e.dataTransfer.files[0];
                if (file) setUploadedFile(file.name);
            };
            const removeFile = () => setUploadedFile(null);

            return (
                <div className="min-h-screen flex flex-col md:flex-row">
                    {/* Desktop Sidebar */}
                    <aside className="w-64 bg-slate-900 text-slate-300 flex-col hidden md:flex shrink-0 min-h-screen">
                        <div className="p-6">
                            <div className="flex items-center gap-2 text-white font-bold text-xl mb-8">
                                <i className="fa-solid fa-brain text-emerald-400"></i>
                                <span>AI 통합 분석기</span>
                            </div>
                            <nav className="space-y-2">
                                <button onClick={() => setActiveTab('analyze')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-colors ${activeTab === 'analyze' ? 'bg-indigo-600 text-white' : 'hover:bg-slate-800'}`}>
                                    <i className="fa-solid fa-chart-line text-lg"></i> 새로운 분석
                                </button>
                                <button onClick={() => setActiveTab('history')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-colors ${activeTab === 'history' ? 'bg-indigo-600 text-white' : 'hover:bg-slate-800'}`}>
                                    <i className="fa-solid fa-database text-lg"></i> 분석 기록
                                </button>
                                <button onClick={() => setActiveTab('settings')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-colors ${activeTab === 'settings' ? 'bg-indigo-600 text-white' : 'hover:bg-slate-800'}`}>
                                    <i className="fa-solid fa-building text-lg"></i> 회사 설정
                                </button>
                            </nav>
                        </div>
                        <div className="mt-auto p-6 text-sm text-slate-500">
                            <p>ESG-DART Integration</p>
                            <p>v1.2.0 (Stable Link)</p>
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 flex flex-col h-screen overflow-hidden relative">
                        {/* Header */}
                        <header className="bg-white border-b border-slate-200 px-4 md:px-8 py-4 flex items-center justify-between z-10 shrink-0 shadow-sm md:shadow-none">
                            <h1 className="text-lg md:text-2xl font-bold text-slate-800 truncate pr-4">
                                {activeTab === 'analyze' && 'ESG-재무 통합 분석'}
                                {activeTab === 'history' && '분석 기록'}
                                {activeTab === 'settings' && '환경 설정'}
                            </h1>
                            <div className="flex items-center gap-2 sm:gap-4 shrink-0">
                                <div className="flex items-center gap-1.5 sm:gap-2 bg-emerald-50 text-emerald-700 px-2 sm:px-3 py-1 sm:py-1.5 rounded-full text-xs sm:text-sm font-medium border border-emerald-200 whitespace-nowrap">
                                    <span className="w-1.5 h-1.5 sm:w-2 sm:h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                                    <span className="hidden sm:inline">DART 시스템 연결됨</span>
                                    <span className="sm:hidden">DART</span>
                                </div>
                            </div>
                        </header>

                        {/* Content Area */}
                        <div className="flex-1 overflow-auto p-4 sm:p-6 md:p-8 pb-24 md:pb-8 scroll-smooth w-full">
                            <div className="max-w-6xl mx-auto w-full">
                                
                                {/* --- INPUT STATE --- */}
                                {analysisState === 'idle' && (
                                    <div className="space-y-4 md:space-y-6">
                                        <div className="bg-white p-5 md:p-8 rounded-2xl shadow-sm border border-slate-200">
                                            <h2 className="text-base md:text-lg font-semibold mb-4 md:mb-6 flex items-center gap-2">
                                                <i className="fa-solid fa-file-lines text-indigo-500 text-xl"></i>
                                                분석 대상 정보 입력
                                            </h2>
                                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 md:gap-8">
                                                {/* Left: Internal Data */}
                                                <div className="space-y-4">
                                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                                        <div>
                                                            <label className="block text-sm font-medium text-slate-700 mb-1">대상 기업명</label>
                                                            <input type="text" value={companyName} onChange={(e) => setCompanyName(e.target.value)} placeholder="예: 삼성전자" className="w-full px-3 md:px-4 py-2 text-sm md:text-base border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all" />
                                                        </div>
                                                        <div>
                                                            <label className="block text-sm font-medium text-slate-700 mb-1">산업/업종</label>
                                                            <select value={industry} onChange={(e) => setIndustry(e.target.value)} className="w-full px-3 md:px-4 py-2 text-sm md:text-base border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all bg-white">
                                                                <option value="IT/소프트웨어">IT/소프트웨어</option>
                                                                <option value="반도체/디스플레이">반도체/디스플레이</option>
                                                                <option value="자동차/모빌리티">자동차/모빌리티</option>
                                                                <option value="화학/에너지">화학/에너지</option>
                                                                <option value="금융/핀테크">금융/핀테크</option>
                                                                <option value="바이오/제약">바이오/제약</option>
                                                            </select>

                                                <h3 className="text-base md:text-lg font-bold text-slate-800 flex items-center gap-2 min-w-0">
                                                    <i className="fa-solid fa-arrow-trend-up text-blue-500 text-xl md:text-2xl shrink-0"></i>
                                                    <span className="truncate">동종 업계 샘플링 회귀 분석</span>
                                                </h3>
                                                <div className="text-[10px] md:text-xs text-slate-500 flex items-center gap-1.5 bg-slate-50 px-2 py-1 rounded-md border border-slate-100 shrink-0 w-max">
                                                    <i className="fa-solid fa-users text-sm shrink-0"></i>
                                                    <span><strong>{industry}</strong> {result.peerSampling.sampleSize}개사 기준</span>
                                                </div>
                                            </div>

                                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 md:gap-8 mb-6 w-full">
                                                {/* Visual Scatter Plot Area */}
                                                <div className="bg-slate-50 p-4 md:p-6 rounded-xl border border-slate-200 flex flex-col justify-center w-full overflow-hidden">
                                                    <div className="text-xs md:text-sm font-bold text-slate-700 mb-6 text-center break-keep">
                                                        ESG 스코어와 영업이익률 상관관계
                                                    </div>
                                                    
                                                    {/* Responsive Plot Wrapper */}
                                                    <div className="pl-12 md:pl-14 pb-10 md:pb-12 pr-4 pt-4 w-full">
                                                        <div className="relative w-full h-44 md:h-52 border-l-2 border-b-2 border-slate-400">
                                                            {/* Y-axis labels */}
                                                            <div className="absolute -left-10 md:-left-12 bottom-0 text-[10px] md:text-xs text-slate-500 w-8 md:w-10 text-right translate-y-1/2">0%</div>
                                                            <div className="absolute -left-10 md:-left-12 top-0 text-[10px] md:text-xs text-slate-500 w-8 md:w-10 text-right -translate-y-1/2">30%</div>
                                                            <div className="absolute -left-10 md:-left-12 top-1/2 -translate-y-1/2 -rotate-90 text-[10px] md:text-xs font-medium text-slate-600 whitespace-nowrap">영업이익률</div>
                                                            
                                                            {/* X-axis labels */}
                                                            <div className="absolute left-0 -bottom-6 md:-bottom-8 text-[10px] md:text-xs text-slate-500 -translate-x-1/2">50</div>
                                                            <div className="absolute right-0 -bottom-6 md:-bottom-8 text-[10px] md:text-xs text-slate-500 translate-x-1/2">100</div>
                                                            <div className="absolute left-1/2 -bottom-6 md:-bottom-8 -translate-x-1/2 text-[10px] md:text-xs font-medium text-slate-600 whitespace-nowrap">ESG 통합 스코어</div>

                                                            {/* Regression Line (SVG) */}
                                                            <svg className="absolute inset-0 w-full h-full overflow-visible">
                                                                <line x1="0%" y1="90%" x2="100%" y2="10%" stroke="#818cf8" strokeWidth="2" strokeDasharray="4,4" className="md:stroke-[3px] md:stroke-dasharray-[6,6]" />
                                                            </svg>

                                                            {/* Peer Data Points */}
                                                            {result.peerSampling.peers.map((peer, i) => {
                                                                const xPos = Math.max(0, Math.min(100, ((peer.esgTotal - 50) / 50) * 100)); 
                                                                const yPos = Math.max(0, Math.min(100, 100 - ((peer.opMargin / 30) * 100))); 
                                                                return (
                                                                    <div key={i} className={`absolute rounded-full border-2 transform -translate-x-1/2 -translate-y-1/2 ${peer.isTarget ? 'bg-indigo-600 border-white shadow-md z-10 w-3.5 h-3.5 md:w-4 md:h-4' : 'bg-slate-300 border-slate-400 w-2.5 h-2.5 md:w-3 md:h-3'}`} style={{ left: `${xPos}%`, top: `${yPos}%` }} title={`${peer.name}: ESG ${peer.esgTotal}, 이익률 ${peer.opMargin}%`}>
                                                                        {peer.isTarget && (
                                                                            <div className="absolute bottom-full left-1/2 -translate-x-1/2 mb-1.5 md:mb-2 bg-indigo-600 text-white text-[9px] md:text-[10px] px-1.5 md:px-2 py-0.5 rounded whitespace-nowrap font-medium shadow-sm">
                                                                                분석 대상
                                                                            </div>
                                                                        )}
                                                                    </div>
                                                                );
                                                            })}
                                                        </div>
                                                    </div>
                                                </div>

                                                {/* Formula & Peer Table */}
                                                <div className="flex flex-col gap-4 w-full min-w-0">
                                                    <div className="bg-white p-3 md:p-4 rounded-xl border border-slate-200">
                                                        <div className="text-[10px] md:text-xs font-medium text-slate-500 mb-1.5">도출된 최적 회귀 방정식</div>
                                                        <div className="text-xs md:text-sm font-mono font-semibold text-indigo-900 bg-indigo-50/50 p-2 md:p-3 rounded-lg border border-indigo-100 break-all leading-relaxed">
                                                            {result.regression.formula}
                                                        </div>
                                                    </div>
                                                    
                                                    <div className="border border-slate-200 rounded-xl overflow-x-auto w-full custom-scrollbar">
                                                        <table className="w-full text-[10px] md:text-xs text-left min-w-[280px]">
                                                            <thead className="bg-slate-100 text-slate-600 font-medium">
                                                                <tr>
                                                                    <th className="px-3 py-2.5 whitespace-nowrap">샘플 기업</th>
                                                                    <th className="px-3 py-2.5 text-right whitespace-nowrap">ESG 점수</th>
                                                                    <th className="px-3 py-2.5 text-right whitespace-nowrap">영업이익률</th>
                                                                </tr>
                                                            </thead>
                                                            <tbody>
                                                                {result.peerSampling.peers.map((peer, i) => (
                                                                    <tr key={i} className={`border-t border-slate-100 ${peer.isTarget ? 'bg-indigo-50 font-bold text-indigo-900' : 'text-slate-600 hover:bg-slate-50'}`}>
                                                                        <td className="px-3 py-2.5 flex items-center gap-1.5 whitespace-nowrap">
                                                                            {peer.isTarget && <span className="w-1.5 h-1.5 rounded-full bg-indigo-500 shrink-0"></span>}
                                                                            {peer.name}
                                                                        </td>
                                                                        <td className="px-3 py-2.5 text-right whitespace-nowrap">{peer.esgTotal}</td>
                                                                        <td className="px-3 py-2.5 text-right whitespace-nowrap">{peer.opMargin}%</td>
                                                                    </tr>
                                                                ))}
                                                            </tbody>
                                                        </table>
                                                    </div>
                                                </div>
                                            </div>
                                            
                                            {/* Stats Detail */}
                                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-6 w-full">
                                                <div className="col-span-1 md:col-span-2 w-full min-w-0">
                                                    <h4 className="text-xs md:text-sm font-bold text-slate-700 mb-2 md:mb-3">독립 변수 통계 검정 결과</h4>
                                                    <div className="overflow-x-auto border border-slate-200 rounded-xl w-full custom-scrollbar">
                                                        <table className="w-full text-[10px] md:text-sm text-left border-collapse min-w-[320px]">
                                                            <thead className="bg-slate-100 text-slate-600 font-medium border-b border-slate-200">
                                                                <tr>
                                                                    <th className="px-4 py-2.5 md:py-3 whitespace-nowrap">변수명</th>
                                                                    <th className="px-4 py-2.5 md:py-3 whitespace-nowrap">계수(Coef)</th>
                                                                    <th className="px-4 py-2.5 md:py-3 whitespace-nowrap">P-value</th>
                                                                    <th className="px-4 py-2.5 md:py-3 whitespace-nowrap">유의성</th>
                                                                </tr>
                                                            </thead>
                                                            <tbody>
                                                                {result.regression.variables.map((v, i) => (
                                                                    <tr key={i} className="border-b border-slate-100 last:border-0 hover:bg-slate-50 transition-colors">
                                                                        <td className="px-4 py-2.5 md:py-3 font-medium text-slate-700 whitespace-nowrap">{v.name}</td>
                                                                        <td className="px-4 py-2.5 md:py-3 text-slate-600 whitespace-nowrap">{v.coef}</td>
                                                                        <td className="px-4 py-2.5 md:py-3 text-slate-600 whitespace-nowrap">{v.p}</td>
                                                                        <td className="px-4 py-2.5 md:py-3 font-bold text-indigo-600 whitespace-nowrap">{v.sig}</td>
                                                                    </tr>
                                                                ))}
                                                            </tbody>
                                                        </table>
                                                    </div>
                                                    <div className="text-[9px] md:text-xs text-slate-400 mt-2 px-1 break-keep">
                                                        * 유의수준: *** p&lt;0.01 (99% 신뢰도), ** p&lt;0.05, * p&lt;0.1, ns: Not Significant
                                                    </div>
                                                </div>
                                                
                                                <div className="space-y-3 md:space-y-4">
                                                    <div className="bg-blue-50 border border-blue-100 rounded-xl p-3 md:p-4">
                                                        <div className="text-[10px] md:text-xs font-bold text-blue-800 mb-1">결정계수 (R²)</div>
                                                        <div className="text-2xl md:text-3xl font-black text-blue-600">{result.regression.rSquared}</div>
                                                        <div className="text-[10px] md:text-xs text-blue-700 mt-1 break-keep">모형의 설명력이 매우 높습니다.</div>
                                                    </div>
                                                    <div className="bg-white border border-slate-200 rounded-xl p-3 md:p-4">
                                                        <div className="text-[10px] md:text-xs font-bold text-slate-700 mb-1.5">분석가 인사이트</div>
                                                        <p className="text-[11px] md:text-xs text-slate-600 leading-relaxed break-words">
                                                            {result.regression.insight}
                                                        </p>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                    </div>
                                )}
                            </div>
                        </div>

                        {/* Mobile Bottom Navigation */}
                        <nav className="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 flex justify-around p-2 z-50 pb-safe shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
                            <button onClick={() => setActiveTab('analyze')} className={`flex flex-col items-center flex-1 py-1 transition-colors ${activeTab === 'analyze' ? 'text-indigo-600' : 'text-slate-400 hover:text-slate-600'}`}>
                                <i className={`fa-solid fa-chart-line text-[22px] ${activeTab === 'analyze' ? 'animate-bounce-slight' : ''}`}></i>
                                <span className="text-[10px] font-medium mt-1">새로운 분석</span>
                            </button>
                            <button onClick={() => setActiveTab('history')} className={`flex flex-col items-center flex-1 py-1 transition-colors ${activeTab === 'history' ? 'text-indigo-600' : 'text-slate-400 hover:text-slate-600'}`}>
                                <i className="fa-solid fa-database text-[22px]"></i>
                                <span className="text-[10px] font-medium mt-1">분석 기록</span>
                            </button>
                            <button onClick={() => setActiveTab('settings')} className={`flex flex-col items-center flex-1 py-1 transition-colors ${activeTab === 'settings' ? 'text-indigo-600' : 'text-slate-400 hover:text-slate-600'}`}>
                                <i className="fa-solid fa-building text-[22px]"></i>
                                <span className="text-[10px] font-medium mt-1">회사 설정</span>
                            </button>
                        </nav>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
