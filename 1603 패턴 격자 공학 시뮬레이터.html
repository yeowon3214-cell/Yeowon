<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1603 패턴 격자 공학 시뮬레이터</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #020617; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        canvas { display: block; }
        input[type=range] { accent-color: #38bdf8; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-slate-100 select-none">

    <div class="flex flex-col md:flex-row h-screen overflow-hidden">
        
        <!-- 뷰포트 영역 (상단/좌측) -->
        <div class="relative flex-grow h-[55vh] md:h-full bg-slate-900/20">
            <div id="canvas-container" class="w-full h-full"></div>
            
            <!-- 오버레이 헤더 -->
            <div class="absolute top-4 left-4 p-4 bg-slate-900/80 backdrop-blur-xl rounded-3xl border border-white/5 flex items-center gap-3 shadow-2xl">
                <div class="w-3 h-3 bg-sky-500 rounded-full animate-pulse shadow-[0_0_10px_#0ea5e9]"></div>
                <div>
                    <h1 class="text-sm font-black tracking-tighter uppercase leading-none">Pattern 1603 Analyzer</h1>
                    <p class="text-[10px] text-slate-500 font-bold tracking-widest mt-1">ENGINEERING SIMULATION</p>
                </div>
            </div>

            <!-- 범례 (데스크탑 전용) -->
            <div class="absolute bottom-4 right-4 hidden sm:flex flex-col gap-1 text-[9px] font-bold text-slate-500 bg-black/20 p-2 rounded-lg">
                <div class="flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-slate-600"></span> GRID MEMBERS</div>
                <div class="flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-sky-500"></span> DIAMOND CORE</div>
                <div class="flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-rose-500"></span> LOAD PATH</div>
            </div>
        </div>

        <!-- 컨트롤 패널 (하단/우측) -->
        <div class="w-full md:w-[400px] lg:w-[450px] h-[45vh] md:h-full bg-slate-900 border-t md:border-t-0 md:border-l border-white/10 p-6 flex flex-col gap-6 overflow-y-auto no-scrollbar">
            
            <!-- 적층 방식 토글 -->
            <div class="space-y-3">
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>
                    Stacking Logic
                </label>
                <div class="grid grid-cols-2 bg-slate-950 p-1 rounded-2xl border border-white/5">
                    <button id="btn-straight" class="py-3 text-xs font-black rounded-xl transition-all bg-sky-500 text-slate-950 shadow-lg">일직선 적층</button>
                    <button id="btn-twisted" class="py-3 text-xs font-black rounded-xl transition-all text-slate-500 hover:text-slate-300">나선형 뒤틀림</button>
                </div>
            </div>

            <!-- 슬라이더 제어 -->
            <div class="grid grid-cols-1 gap-6">
                <div class="space-y-3">
                    <div class="flex justify-between items-center text-[11px] font-bold">
                        <span class="text-slate-400 flex items-center gap-2">적층 단수 (Layers)</span>
                        <span id="label-layers" class="text-sky-400 font-mono">10</span>
                    </div>
                    <input type="range" id="input-layers" min="1" max="40" value="10" class="w-full h-2 bg-slate-800 rounded-lg appearance-none cursor-pointer">
                </div>

                <div id="angle-container" class="space-y-3 opacity-20 pointer-events-none transition-opacity duration-300">
                    <div class="flex justify-between items-center text-[11px] font-bold">
                        <span class="text-slate-400 flex items-center gap-2">목표 회전각 (Angle)</span>
                        <span id="label-angle" class="text-sky-400 font-mono">45°</span>
                    </div>
                    <input type="range" id="input-angle" min="0" max="180" value="45" class="w-full h-2 bg-slate-800 rounded-lg appearance-none cursor-pointer">
                </div>

                <div class="space-y-3">
                    <div class="flex justify-between items-center text-[11px] font-bold">
                        <span class="text-slate-400 flex items-center gap-2">층간 높이 (Pitch)</span>
                        <span id="label-height" class="text-sky-400 font-mono">1.8</span>
                    </div>
                    <input type="range" id="input-height" min="0.5" max="4.0" step="0.1" value="1.8" class="w-full h-2 bg-slate-800 rounded-lg appearance-none cursor-pointer">
                </div>
            </div>

            <!-- 실시간 분석 데이터 -->
            <div class="bg-slate-950/50 rounded-3xl p-5 border border-white/5 space-y-4">
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                    Live Performance Data
                </label>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <span class="text-[9px] text-slate-500 font-bold uppercase">비틀림 강성</span>
                        <span id="val-torsion" class="text-lg font-black text-sky-400 block font-mono">15%</span>
                        <div class="w-full h-1 bg-slate-800 rounded-full overflow-hidden">
                            <div id="bar-torsion" class="h-full bg-sky-500 transition-all duration-500" style="width: 15%"></div>
                        </div>
                    </div>
                    <div class="space-y-1">
                        <span class="text-[9px] text-slate-500 font-bold uppercase">수직 투과율</span>
                        <span id="val-perm" class="text-lg font-black text-emerald-400 block font-mono">100%</span>
                        <div class="w-full h-1 bg-slate-800 rounded-full overflow-hidden">
                            <div id="bar-perm" class="h-full bg-emerald-500 transition-all duration-500" style="width: 100%"></div>
                        </div>
                    </div>
                    <div class="space-y-1 col-span-2">
                        <div class="flex justify-between items-center">
                            <span class="text-[9px] text-slate-500 font-bold uppercase">동적 부하량 (Dynamic)</span>
                            <span id="val-dynamic" class="text-xs font-bold text-rose-400 font-mono">5.0 N/m</span>
                        </div>
                        <div class="w-full h-1 bg-slate-800 rounded-full overflow-hidden">
                            <div id="bar-dynamic" class="h-full bg-rose-500 transition-all duration-300" style="width: 5%"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 하단 액션 버튼 -->
            <div class="mt-auto space-y-3">
                <div class="flex gap-3">
                    <button id="btn-spin" class="flex-grow py-4 rounded-2xl text-[11px] font-black flex items-center justify-center gap-3 transition-all bg-slate-800 text-slate-300 hover:bg-slate-700">
                        <svg id="icon-play" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                        <span id="text-spin">START AUTO SPIN</span>
                    </button>
                    <button id="btn-reset" class="px-5 py-4 bg-slate-800 text-slate-400 rounded-2xl hover:text-white transition-colors border border-white/5 active:scale-95">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></svg>
                    </button>
                </div>
                
                <div class="space-y-2">
                    <div class="flex justify-between text-[10px] font-bold text-slate-500">
                        <span>SPIN SPEED</span>
                        <span id="label-speed" class="text-sky-400 font-mono">x1.0</span>
                    </div>
                    <input type="range" id="input-speed" min="0.1" max="5.0" step="0.1" value="1.0" class="w-full h-1.5 bg-slate-800 rounded-lg appearance-none cursor-pointer">
                </div>
            </div>

        </div>
    </div>

    <script>
        // --- Configuration & State ---
        let layers = 10;
        let targetAngle = 45;
        let zPitch = 1.8;
        let isSpinning = false;
        let spinSpeed = 1.0;
        let isTwisted = false;

        // 1603 Pattern Data
        const getPatternNodes = () => {
            const nodes = [];
            const gridSize = 5;
            const spacing = 2;
            for (let i = 0; i < gridSize; i++) {
                for (let j = 0; j < gridSize; j++) {
                    nodes.push({ x: (i - 2) * spacing, y: (j - 2) * spacing });
                }
            }
            for (let i = 0; i < gridSize - 1; i++) {
                for (let j = 0; j < gridSize - 1; j++) {
                    nodes.push({ x: (i - 1.5) * spacing, y: (j - 1.5) * spacing });
                }
            }
            return nodes;
        };
        const baseNodes = getPatternNodes();

        // --- Three.js Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020617);
        scene.fog = new THREE.Fog(0x020617, 40, 160);

        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(30, 25, 40);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);
        const light = new THREE.DirectionalLight(0x38bdf8, 1.5);
        light.position.set(10, 40, 20);
        scene.add(light);

        const latticeGroup = new THREE.Group();
        scene.add(latticeGroup);

        // --- Core Functions ---
        function addLine(group, p1, p2, mat) {
            const geo = new THREE.BufferGeometry().setFromPoints([p1, p2]);
            group.add(new THREE.Line(geo, mat));
        }

        function updateStructure() {
            while (latticeGroup.children.length > 0) latticeGroup.remove(latticeGroup.children[0]);

            const angleStep = (targetAngle * Math.PI) / 180;
            const nodesByLayer = [];
            const gridMat = new THREE.LineBasicMaterial({ color: 0x475569, transparent: true, opacity: 0.15 });
            const diamondMat = new THREE.LineBasicMaterial({ color: 0x0ea5e9, transparent: true, opacity: 0.8 });
            const vertMat = new THREE.LineBasicMaterial({ color: 0xf43f5e, transparent: true, opacity: 0.5 });
            const nodeGeo = new THREE.SphereGeometry(0.12, 8, 8);
            const nodeMat = new THREE.MeshPhongMaterial({ color: 0x38bdf8, emissive: 0x0c4a6e });

            for (let l = 0; l < layers; l++) {
                const layerNodes = [];
                const currentAngle = isTwisted ? l * angleStep : 0;
                const y = (l - (layers - 1) / 2) * zPitch;

                baseNodes.forEach((bn) => {
                    const rx = bn.x * Math.cos(currentAngle) - bn.y * Math.sin(currentAngle);
                    const rz = bn.x * Math.sin(currentAngle) + bn.y * Math.cos(currentAngle);
                    const pos = new THREE.Vector3(rx, y, rz);
                    layerNodes.push(pos);

                    const dot = new THREE.Mesh(nodeGeo, nodeMat);
                    dot.position.copy(pos);
                    latticeGroup.add(dot);
                });

                // Intra-layer (Grid)
                for (let i = 0; i < 5; i++) {
                    for (let j = 0; j < 5; j++) {
                        const curr = i * 5 + j;
                        if (j < 4) addLine(latticeGroup, layerNodes[curr], layerNodes[curr + 1], gridMat);
                        if (i < 4) addLine(latticeGroup, layerNodes[curr], layerNodes[curr + 5], gridMat);
                    }
                }
                // Diamond hubs
                const centerStart = 25;
                let c = 0;
                for (let i = 0; i < 4; i++) {
                    for (let j = 0; j < 4; j++) {
                        const center = layerNodes[centerStart + c];
                        addLine(latticeGroup, center, layerNodes[i * 5 + j], diamondMat);
                        addLine(latticeGroup, center, layerNodes[i * 5 + j + 1], diamondMat);
                        addLine(latticeGroup, center, layerNodes[(i + 1) * 5 + j], diamondMat);
                        addLine(latticeGroup, center, layerNodes[(i + 1) * 5 + j + 1], diamondMat);
                        c++;
                    }
                }

                // Inter-layer (Verticals)
                if (l > 0) {
                    const prev = nodesByLayer[l - 1];
                    layerNodes.forEach((node, idx) => {
                        addLine(latticeGroup, prev[idx], node, vertMat);
                    });
                }
                nodesByLayer.push(layerNodes);
            }
            updateMetrics();
        }

        function updateMetrics() {
            const actualAngle = isTwisted ? targetAngle : 0;
            const rad = (actualAngle * Math.PI) / 180;
            
            const torsion = actualAngle === 0 ? 15 : 35 + Math.abs(Math.sin(rad * 2)) * 65;
            const perm = actualAngle === 0 ? 100 : Math.max(2, 100 - (actualAngle * 0.7) - (layers * 1.8) + (zPitch * 5));
            const dynamicLoad = isSpinning ? (spinSpeed * 20) + (layers * 0.5) : (spinSpeed * 5);

            document.getElementById('val-torsion').innerText = torsion.toFixed(0) + "%";
            document.getElementById('bar-torsion').style.width = torsion + "%";
            
            document.getElementById('val-perm').innerText = perm.toFixed(0) + "%";
            document.getElementById('bar-perm').style.width = perm + "%";
            
            document.getElementById('val-dynamic').innerText = dynamicLoad.toFixed(1) + " N/m";
            document.getElementById('bar-dynamic').style.width = Math.min(100, dynamicLoad) + "%";
        }

        function onWindowResize() {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (isSpinning) {
                latticeGroup.rotation.y += spinSpeed * 0.01;
            }
            controls.update();
            renderer.render(scene, camera);
        }

        // --- UI Handlers ---
        document.getElementById('input-layers').oninput = function() {
            layers = parseInt(this.value);
            document.getElementById('label-layers').innerText = layers;
            updateStructure();
        };

        document.getElementById('input-angle').oninput = function() {
            targetAngle = parseInt(this.value);
            document.getElementById('label-angle').innerText = targetAngle + "°";
            updateStructure();
        };

        document.getElementById('input-height').oninput = function() {
            zPitch = parseFloat(this.value);
            document.getElementById('label-height').innerText = zPitch.toFixed(1);
            updateStructure();
        };

        document.getElementById('input-speed').oninput = function() {
            spinSpeed = parseFloat(this.value);
            document.getElementById('label-speed').innerText = "x" + spinSpeed.toFixed(1);
            updateMetrics();
        };

        document.getElementById('btn-straight').onclick = function() {
            isTwisted = false;
            this.className = "py-3 text-xs font-black rounded-xl transition-all bg-sky-500 text-slate-950 shadow-lg";
            document.getElementById('btn-twisted').className = "py-3 text-xs font-black rounded-xl transition-all text-slate-500 hover:text-slate-300";
            document.getElementById('angle-container').classList.add('opacity-20', 'pointer-events-none');
            updateStructure();
        };

        document.getElementById('btn-twisted').onclick = function() {
            isTwisted = true;
            this.className = "py-3 text-xs font-black rounded-xl transition-all bg-sky-500 text-slate-950 shadow-lg";
            document.getElementById('btn-straight').className = "py-3 text-xs font-black rounded-xl transition-all text-slate-500 hover:text-slate-300";
            document.getElementById('angle-container').classList.remove('opacity-20', 'pointer-events-none');
            updateStructure();
        };

        document.getElementById('btn-spin').onclick = function() {
            isSpinning = !isSpinning;
            const text = document.getElementById('text-spin');
            const iconPlay = document.getElementById('icon-play');
            if (isSpinning) {
                this.classList.replace('bg-slate-800', 'bg-rose-500');
                this.classList.replace('text-slate-300', 'text-white');
                text.innerText = "STOP AUTO SPIN";
                iconPlay.innerHTML = '<rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect>';
            } else {
                this.classList.replace('bg-rose-500', 'bg-slate-800');
                this.classList.replace('text-white', 'text-slate-300');
                text.innerText = "START AUTO SPIN";
                iconPlay.innerHTML = '<polygon points="5 3 19 12 5 21 5 3"></polygon>';
            }
            updateMetrics();
        };

        document.getElementById('btn-reset').onclick = function() {
            location.reload();
        };

        // Initialize
        window.addEventListener('resize', onWindowResize);
        updateStructure();
        animate();
    </script>
</body>
</html>
