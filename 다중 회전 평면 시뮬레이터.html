<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Multi-Layout Overlap Sim Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: radial-gradient(circle at center, #0f172a 0%, #020617 100%); color: white; font-family: 'Pretendard', system-ui, sans-serif; touch-action: none; }
        canvas { display: block; }
        
        .main-wrapper { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
        @media (min-width: 1024px) { .main-wrapper { flex-direction: row; } }

        .sidebar {
            background: rgba(15, 23, 42, 0.96);
            backdrop-filter: blur(25px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }
        @media (min-width: 1024px) { .sidebar { width: 380px; height: 100vh; padding: 32px 24px; } }
        @media (max-width: 1023px) {
            .sidebar {
                position: absolute; bottom: 0; left: 0; width: 100%;
                max-height: 48vh; padding: 20px;
                border-top: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 28px 28px 0 0;
            }
        }

        input[type=range] { -webkit-appearance: none; background: transparent; cursor: pointer; width: 100%; }
        input[type=range]::-webkit-slider-runnable-track { height: 4px; background: rgba(51, 65, 85, 0.5); border-radius: 2px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%; background: #38bdf8; margin-top: -7px; border: 2px solid #fff; box-shadow: 0 0 10px rgba(56, 189, 248, 0.4); }

        .mode-btn { transition: all 0.2s ease; border: 1px solid rgba(255,255,255,0.1); color: #94a3b8; }
        .mode-btn.active { background: #38bdf8; color: #000; border-color: #38bdf8; font-weight: 800; box-shadow: 0 0 20px rgba(56, 189, 248, 0.3); }

        .visualizer-container { flex-grow: 1; position: relative; }
        .ratio-bar { height: 6px; background: #0f172a; border-radius: 3px; display: flex; overflow: hidden; margin: 12px 0; }
        .ratio-seg { height: 100%; transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body>

<div class="main-wrapper">
    <aside class="sidebar" id="sidebar">
        <div class="lg:hidden w-12 h-1 bg-slate-700 mx-auto rounded-full mb-4"></div>
        
        <header class="mb-4">
            <h1 class="text-xl font-black tracking-tighter text-white">LAYOUT ANALYSIS PRO</h1>
            <p class="text-[9px] text-sky-400 font-bold uppercase tracking-[0.2em]">Linear • Matrix • Stacked</p>
        </header>

        <section class="mb-4 grid grid-cols-3 gap-1.5">
            <button onclick="setMode('linear')" id="btn-linear" class="mode-btn active py-2.5 rounded-lg text-[9px] font-bold uppercase">Linear</button>
            <button onclick="setMode('matrix')" id="btn-matrix" class="mode-btn py-2.5 rounded-lg text-[9px] font-bold uppercase">Matrix</button>
            <button onclick="setMode('centered')" id="btn-center" class="mode-btn py-2.5 rounded-lg text-[9px] font-bold uppercase">Stacked</button>
        </section>

        <!-- 간격 제어 -->
        <section class="mb-4 space-y-3" id="spacingControl">
            <div>
                <div class="flex justify-between items-center mb-1">
                    <label class="text-[9px] font-bold text-slate-500 uppercase tracking-widest text-sky-300">Global Spacing (Gap)</label>
                    <span id="spacingVal" class="text-[10px] font-mono text-white">4.80</span>
                </div>
                <input type="range" min="0" max="10" step="0.01" value="4.8" id="spacingSlider">
            </div>
        </section>

        <section class="flex-grow overflow-y-auto pr-1">
            <label class="text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-2 block">Energy Distribution</label>
            <div class="ratio-bar">
                <div id="bar-0" class="ratio-seg" style="background: #3b82f6"></div>
                <div id="bar-1" class="ratio-seg" style="background: #10b981"></div>
                <div id="bar-2" class="ratio-seg" style="background: #f59e0b"></div>
                <div id="bar-3" class="ratio-seg" style="background: #f43f5e"></div>
            </div>

            <div id="controlGroup" class="grid grid-cols-1 gap-2 mt-4"></div>
        </section>

        <footer class="mt-4 pt-4 border-t border-white/5">
            <button id="resetBtn" class="w-full bg-white text-black py-3 rounded-xl text-[11px] font-black uppercase tracking-widest hover:bg-sky-400 transition-all">Initialize Simulation</button>
        </footer>
    </aside>

    <main class="visualizer-container" id="stage">
        <div class="absolute top-6 left-6 pointer-events-none opacity-50 z-10">
            <div class="text-[10px] font-mono tracking-widest uppercase text-sky-500">Active Phase</div>
            <div id="displayModeLabel" class="text-2xl font-black">LINEAR MAPPING</div>
        </div>
    </main>
</div>

<script>
    let scene, camera, renderer, systems = [];
    let isDragging = false, prevX = 0, prevY = 0, zoomDist = 0;
    
    let currentMode = 'linear'; 
    let horizontalSpacing = 4.8;
    const TOTAL_SPEED = 0.08; 
    const PLANE_SIZE = 5.5;

    const config = [
        { id: 0, label: 'Alpha Unit', color: 0x3b82f6 },
        { id: 1, label: 'Bravo Unit', color: 0x10b981 },
        { id: 2, label: 'Charlie Unit', color: 0xf59e0b },
        { id: 3, label: 'Delta Unit', color: 0xf43f5e }
    ];

    function init() {
        const stage = document.getElementById('stage');
        scene = new THREE.Scene();
        
        camera = new THREE.PerspectiveCamera(50, stage.clientWidth / stage.clientHeight, 0.1, 1000);
        camera.position.set(0, 5, 25);

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(stage.clientWidth, stage.clientHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        stage.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.4));
        
        config.forEach((c, i) => {
            createSystem(c, i);
            createUI(c, i);
        });

        document.getElementById('spacingSlider').addEventListener('input', (e) => {
            horizontalSpacing = parseFloat(e.target.value);
            document.getElementById('spacingVal').innerText = horizontalSpacing.toFixed(2);
        });

        setupInteraction();
        animate();
        updateUI();
    }

    function createSystem(c, index) {
        const group = new THREE.Group();
        
        // Z-fighting 방지를 위해 depthWrite: false 설정 및 레이어링 최적화
        const gridMat = new THREE.LineBasicMaterial({ 
            color: c.color, 
            transparent: true, 
            opacity: 0.35,
            depthWrite: false 
        });
        const grid = new THREE.GridHelper(PLANE_SIZE, 10, c.color, 0x1e293b);
        grid.rotation.x = Math.PI / 2;
        grid.material = gridMat;
        group.add(grid);

        // 회전축
        const axisLine = new THREE.Line(
            new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(-3.5, -3.5, 0), new THREE.Vector3(3.5, 3.5, 0)]),
            new THREE.LineBasicMaterial({ color: 0xffffff, opacity: 0.1, transparent: true })
        );
        group.add(axisLine);

        // 입자
        const particle = new THREE.Mesh(
            new THREE.SphereGeometry(0.18, 16, 16),
            new THREE.MeshStandardMaterial({ color: c.color, emissive: c.color, emissiveIntensity: 0.8 })
        );
        group.add(particle);

        // 궤적
        const path = new THREE.Line(
            new THREE.BufferGeometry(),
            new THREE.LineBasicMaterial({ color: c.color, transparent: true, opacity: 0.7 })
        );
        group.add(path);

        systems.push({
            group, color: c.color, speed: TOTAL_SPEED / 4, particle, path, pathPoints: [],
            velocity: new THREE.Vector3(0.04 + (index * 0.004), 0.03, 0),
            rotationAxis: new THREE.Vector3(1, 1, 0).normalize()
        });
        scene.add(group);
    }

    function createUI(c, i) {
        const group = document.getElementById('controlGroup');
        const card = document.createElement('div');
        card.className = 'bg-white/5 p-3 rounded-xl border border-white/5';
        card.innerHTML = `
            <div class="flex justify-between items-center mb-1">
                <div class="flex items-center gap-1.5">
                    <div class="w-1.5 h-1.5 rounded-full" style="background: #${c.color.toString(16).padStart(6, '0')}"></div>
                    <span class="text-[9px] font-black text-slate-400 uppercase tracking-tighter">${c.label}</span>
                </div>
                <span id="val-${i}" class="text-[10px] font-mono font-bold text-sky-400">25.0%</span>
            </div>
            <input type="range" min="0.001" max="0.06" step="0.0001" value="${TOTAL_SPEED/4}" id="sld-${i}">
        `;
        group.appendChild(card);
        card.querySelector('input').addEventListener('input', (e) => syncRatios(i, parseFloat(e.target.value)));
    }

    function setMode(mode) {
        currentMode = mode;
        const modes = ['linear', 'matrix', 'centered'];
        modes.forEach(m => {
            const btn = document.getElementById(`btn-${m === 'linear' ? 'linear' : m === 'matrix' ? 'matrix' : 'center'}`);
            if(btn) btn.classList.toggle('active', m === mode);
        });
        
        const labels = { 'linear': 'LINEAR MAPPING', 'matrix': '2x2 MATRIX PHASE', 'centered': 'CENTRAL OVERLAP' };
        document.getElementById('displayModeLabel').innerText = labels[mode];
        
        document.getElementById('spacingControl').style.opacity = mode !== 'centered' ? '1' : '0.2';
        document.getElementById('spacingControl').style.pointerEvents = mode !== 'centered' ? 'auto' : 'none';
    }

    function syncRatios(idx, val) {
        const oldVal = systems[idx].speed;
        const delta = val - oldVal;
        let otherSum = 0;
        systems.forEach((s, i) => { if(i !== idx) otherSum += s.speed; });

        systems.forEach((s, i) => {
            if(i !== idx) {
                const w = s.speed / otherSum;
                s.speed = Math.max(0.001, s.speed - delta * w);
            } else {
                s.speed = val;
            }
        });

        // 합계 정규화 (부동소수점 오차 방지)
        const total = systems.reduce((acc, s) => acc + s.speed, 0);
        systems.forEach(s => s.speed = (s.speed / total) * TOTAL_SPEED);
        updateUI();
    }

    function updateUI() {
        systems.forEach((s, i) => {
            const perc = (s.speed / TOTAL_SPEED) * 100;
            document.getElementById(`sld-${i}`).value = s.speed;
            document.getElementById(`val-${i}`).innerText = perc.toFixed(1) + '%';
            document.getElementById(`bar-${i}`).style.width = perc + '%';
        });
    }

    function setupInteraction() {
        const stage = document.getElementById('stage');
        const onStart = (x, y) => { isDragging = true; prevX = x; prevY = y; };
        const onMove = (x, y) => {
            if (!isDragging) return;
            scene.rotation.y += (x - prevX) * 0.006;
            scene.rotation.x += (y - prevY) * 0.006;
            prevX = x; prevY = y;
        };
        
        window.addEventListener('mousedown', e => onStart(e.clientX, e.clientY));
        window.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('touchstart', e => { if (e.touches.length === 1) onStart(e.touches[0].clientX, e.touches[0].clientY); else if (e.touches.length === 2) zoomDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); });
        window.addEventListener('touchmove', e => { if (e.target.closest('.sidebar')) return; if (e.touches.length === 1) onMove(e.touches[0].clientX, e.touches[0].clientY); else if (e.touches.length === 2) { const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); camera.position.z = Math.max(5, Math.min(60, camera.position.z + (zoomDist - d) * 0.05)); zoomDist = d; } e.preventDefault(); }, { passive: false });
        window.addEventListener('touchend', () => isDragging = false);
        window.addEventListener('resize', () => { camera.aspect = stage.clientWidth / stage.clientHeight; camera.updateProjectionMatrix(); renderer.setSize(stage.clientWidth, stage.clientHeight); });
        
        document.getElementById('resetBtn').onclick = () => { 
            systems.forEach(s => { s.speed = TOTAL_SPEED / 4; s.pathPoints = []; s.particle.position.set(0, 0, 0); }); 
            horizontalSpacing = 4.8;
            document.getElementById('spacingSlider').value = 4.8;
            document.getElementById('spacingVal').innerText = "4.80";
            updateUI(); 
        };
    }

    function animate() {
        requestAnimationFrame(animate);
        const stage = document.getElementById('stage');
        const scale = Math.min(stage.clientWidth / 900, 1.2);
        const isMobile = window.innerWidth < 1024;
        
        const yBase = isMobile ? 3.8 : 0.8;

        systems.forEach((s, i) => {
            let targetX = 0;
            let targetY = yBase;
            let targetZ = i * 0.15; // Z 오프셋을 약간 늘려 시각적 분리감 확보

            if (currentMode === 'linear') {
                targetX = (i - 1.5) * horizontalSpacing * scale;
            } else if (currentMode === 'matrix') {
                // 가로 2개 그룹(왼쪽 0,1 / 오른쪽 2,3)
                const isLeft = i < 2;
                const isTop = i % 2 === 0;
                targetX = isLeft ? -horizontalSpacing/2 * scale : horizontalSpacing/2 * scale;
                targetY = yBase + (isTop ? horizontalSpacing/3 * scale : -horizontalSpacing/3 * scale);
            } else {
                targetX = 0;
                targetY = yBase;
            }

            // 부드러운 위치 전환
            s.group.position.x = THREE.MathUtils.lerp(s.group.position.x, targetX, 0.1);
            s.group.position.y = THREE.MathUtils.lerp(s.group.position.y, targetY, 0.1);
            s.group.position.z = THREE.MathUtils.lerp(s.group.position.z, targetZ, 0.1);

            s.group.scale.set(scale, scale, scale);
            s.group.rotateOnAxis(s.rotationAxis, s.speed);
            
            // 입자 물리: 로컬 평면 내 바운싱
            s.particle.position.add(s.velocity);
            const limit = (PLANE_SIZE / 2) - 0.25;
            if (Math.abs(s.particle.position.x) > limit) { s.velocity.x *= -1; s.particle.position.x = Math.sign(s.particle.position.x) * limit; }
            if (Math.abs(s.particle.position.y) > limit) { s.velocity.y *= -1; s.particle.position.y = Math.sign(s.particle.position.y) * limit; }
            
            // 궤적 포인트 관리
            s.pathPoints.push(s.particle.position.clone());
            if (s.pathPoints.length > 60) s.pathPoints.shift();
            s.path.geometry.setFromPoints(s.pathPoints);
        });
        renderer.render(scene, camera);
    }
    window.onload = init;
</script>
</body>
</html>
